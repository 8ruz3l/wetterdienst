<div class="min-h-screen bg-gray-950 p-6">
  <div class="max-w-7xl mx-auto">

    <!-- Header -->
    <div class="flex items-center justify-between mb-8">
      <div class="flex items-center gap-4">
        <div>
          <h1 class="text-xl font-bold text-gray-100 tracking-tight">Dashboard</h1>
          <p class="text-xs text-gray-500 mt-0.5">Wetterdaten des Deutschen Wetterdienstes</p>
        </div>
        <div class="w-px h-8 bg-gray-700"></div>
        <!-- Station Dropdown -->
        <div class="relative">
          <select
            class="appearance-none bg-gray-800 border border-gray-700 text-gray-200 text-sm rounded-lg px-3 py-2 pr-8 focus:outline-none focus:border-emerald-500 cursor-pointer"
            [value]="selectedStation.id"
            (change)="onStationChange($event)"
          >
            @for (station of stations; track station.id) {
              <option [value]="station.id">{{ station.name }} ({{ station.bundesland }})</option>
            }
          </select>
          <div class="pointer-events-none absolute inset-y-0 right-2.5 flex items-center">
            <svg class="w-3.5 h-3.5 text-gray-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round" d="M19 9l-7 7-7-7" />
            </svg>
          </div>
        </div>
      </div>

      <!-- Live indicator -->
      <div class="flex items-center gap-2">
        <span class="w-1.5 h-1.5 rounded-full bg-emerald-400 animate-pulse"></span>
        <span class="font-mono text-xs text-emerald-400 tracking-wider uppercase">Live</span>
      </div>
    </div>

    <!-- Alerts -->
    @if (alerts.length > 0) {
      <div class="flex flex-col gap-2 mb-6">
        @for (alert of alerts; track alert.id) {
          <div class="flex items-center justify-between gap-3 px-4 py-3 rounded-xl border text-sm bg-amber-950/60 border-amber-700/50 text-amber-300">
            <span>⚠ <strong>{{ alert.title }}:</strong> {{ alert.message }}</span>
            <button class="opacity-50 hover:opacity-100 transition-opacity" (click)="onAlertDismiss(alert.id)">
              <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" />
              </svg>
            </button>
          </div>
        }
      </div>
    }

    <!-- Widget Grid -->
    <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-4">

      <app-temperature-container
        [stationId]="selectedStation.id"
        [stationName]="selectedStation.name"
      />

      <!-- TODO: <app-precipitation-container /> -->
      <div class="bg-gray-900 border border-gray-800 rounded-2xl p-6 h-64 flex flex-col gap-2 animate-pulse">
        <div class="h-3 w-28 bg-gray-800 rounded"></div>
        <div class="h-16 w-24 bg-gray-800 rounded mt-2"></div>
        <div class="h-3 w-40 bg-gray-800 rounded mt-auto"></div>
        <p class="text-xs text-gray-600 font-mono">// precipitation-container</p>
      </div>

      <!-- TODO: <app-sunshine-container /> -->
      <div class="bg-gray-900 border border-gray-800 rounded-2xl p-6 h-64 flex flex-col gap-2 animate-pulse">
        <div class="h-3 w-28 bg-gray-800 rounded"></div>
        <div class="h-16 w-24 bg-gray-800 rounded mt-2"></div>
        <div class="h-3 w-40 bg-gray-800 rounded mt-auto"></div>
        <p class="text-xs text-gray-600 font-mono">// sunshine-container</p>
      </div>

    </div>

    <!-- TODO: <app-weekly-trend-container /> -->
    <div class="bg-gray-900 border border-gray-800 rounded-2xl p-6 h-72 flex flex-col gap-2 animate-pulse">
      <div class="h-3 w-36 bg-gray-800 rounded"></div>
      <div class="flex-1 bg-gray-800 rounded-xl mt-2"></div>
      <p class="text-xs text-gray-600 font-mono">// weekly-trend-container</p>
    </div>

  </div>
</div>
